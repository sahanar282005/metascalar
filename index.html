<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps AI Incident Response</title>
    <style>
        :root {
            --primary-bg: #0f1419;
            --secondary-bg: #1a1f2e;
            --tertiary-bg: #252d3d;
            --card-bg: #1a1f2e;
            --border-color: #2d3748;
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.healthy {
            background-color: var(--success-color);
        }

        .status-dot.degraded {
            background-color: var(--warning-color);
        }

        .status-dot.crashed {
            background-color: var(--error-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid.full {
            grid-template-columns: 1fr;
        }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-lg);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .card h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
        }

        /* Control Section */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        /* Buttons */
        button {
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--secondary-bg);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        button.primary:hover:not(:disabled) {
            background-color: #2563eb;
        }

        button.success {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        button.success:hover:not(:disabled) {
            background-color: #059669;
        }

        button.warning {
            background-color: var(--warning-color);
            border-color: var(--warning-color);
            color: #000;
        }

        button.warning:hover:not(:disabled) {
            background-color: #d97706;
        }

        /* Select */
        select {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--secondary-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }

        select:hover {
            border-color: var(--accent-primary);
        }

        select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        option {
            background-color: var(--secondary-bg);
            color: var(--text-primary);
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .metric {
            background-color: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            transition: var(--transition);
        }

        .metric:hover {
            border-color: var(--accent-primary);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .metric-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .metric-unit {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .service-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: var(--tertiary-bg);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .service-status:last-child {
            margin-bottom: 0;
        }

        .service-name {
            font-weight: 600;
            flex: 1;
            text-transform: capitalize;
        }

        .service-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .service-indicator.healthy {
            background-color: var(--success-color);
        }

        .service-indicator.degraded {
            background-color: var(--warning-color);
        }

        .service-indicator.crashed {
            background-color: var(--error-color);
        }

        /* Logs Section */
        .logs-container {
            background-color: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
            color: #a0aec0;
        }

        .logs-container::-webkit-scrollbar {
            width: 8px;
        }

        .logs-container::-webkit-scrollbar-track {
            background: var(--secondary-bg);
            border-radius: 4px;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .logs-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
            border-left: 3px solid var(--border-color);
            animation: slideIn 0.3s ease-out;
        }

        .log-entry.info {
            border-left-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .log-entry.success {
            border-left-color: var(--success-color);
            color: var(--success-color);
        }

        .log-entry.warning {
            border-left-color: var(--warning-color);
            color: var(--warning-color);
        }

        .log-entry.error {
            border-left-color: var(--error-color);
            color: var(--error-color);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Summary Section */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .summary-item {
            background-color: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .summary-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .summary-content {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .summary-content.resolved {
            color: var(--success-color);
        }

        .summary-content.unresolved {
            color: var(--warning-color);
        }

        /* Loading Indicator */
        .loading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--accent-primary);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error-color);
            color: var(--error-color);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
        }

        .success-message {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            h1 {
                font-size: 22px;
            }

            header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            button, select {
                width: 100%;
            }

            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state p {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>DevOps AI Incident Response</h1>
            <div class="status-badge">
                <span class="status-dot healthy" id="systemHealthDot"></span>
                <span id="systemStatus">Initializing...</span>
            </div>
        </header>

        <!-- Messages -->
        <div id="messageContainer"></div>

        <!-- Controls Section -->
        <div class="card">
            <h2>Controls</h2>
            <div class="controls">
                <button class="success" id="resetBtn" onclick="resetEnv()">Reset Environment</button>
                <select id="actionSelect">
                    <option value="">Select Action</option>
                    <option value="restart_service">Restart Service</option>
                    <option value="scale_up">Scale Up</option>
                    <option value="clear_cache">Clear Cache</option>
                    <option value="failover">Failover</option>
                    <option value="rollback">Rollback</option>
                    <option value="investigate">Investigate</option>
                </select>
                <button class="primary" id="stepBtn" onclick="stepEnv()">Step</button>
                <button class="warning" id="autoRunBtn" onclick="autoRun()">Auto-Run</button>
            </div>
        </div>

        <!-- System Metrics Section -->
        <div class="card">
            <h2>System Metrics</h2>
            <div class="metrics-grid">
                <div class="metric">
                    <div class="metric-label">API Server</div>
                    <div id="apiStatus" class="metric-value">
                        <span class="service-indicator healthy"></span>
                        <span>—</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Database</div>
                    <div id="dbStatus" class="metric-value">
                        <span class="service-indicator healthy"></span>
                        <span>—</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Worker</div>
                    <div id="workerStatus" class="metric-value">
                        <span class="service-indicator healthy"></span>
                        <span>—</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Error Rate</div>
                    <div class="metric-value">
                        <span id="errorRate">—</span>
                        <span class="metric-unit">%</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Response Time</div>
                    <div class="metric-value">
                        <span id="responseTime">—</span>
                        <span class="metric-unit">ms</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Uptime</div>
                    <div class="metric-value">
                        <span id="uptime">—</span>
                        <span class="metric-unit">%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Logs Section -->
        <div class="card full">
            <h2>Event Logs</h2>
            <div class="logs-container" id="logsContainer">
                <div class="empty-state">
                    <p>System ready. Awaiting events...</p>
                </div>
            </div>
        </div>

        <!-- Episode Summary Section -->
        <div class="card">
            <h2>Episode Summary</h2>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label">Steps Taken</div>
                    <div class="summary-content" id="stepsTaken">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Cumulative Reward</div>
                    <div class="summary-content" id="cumulativeReward">0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Episode Status</div>
                    <div class="summary-content" id="episodeStatus">In Progress</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Resolution</div>
                    <div class="summary-content unresolved" id="resolution">Unresolved</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:8000';

        // State Management
        let appState = {
            currentAction: null,
            isLoading: false,
            logs: [],
            maxLogs: 50
        };

        // Utility Functions
        function setLoading(loading) {
            appState.isLoading = loading;
            document.getElementById('resetBtn').disabled = loading;
            document.getElementById('stepBtn').disabled = loading;
            document.getElementById('autoRunBtn').disabled = loading;
            document.getElementById('actionSelect').disabled = loading;
        }

        function addLog(message, type = 'info') {
            appState.logs.unshift({ message, type, timestamp: new Date() });
            if (appState.logs.length > appState.maxLogs) {
                appState.logs.pop();
            }
            renderLogs();
        }

        function renderLogs() {
            const logsContainer = document.getElementById('logsContainer');
            if (appState.logs.length === 0) {
                logsContainer.innerHTML = '<div class="empty-state"><p>No logs yet</p></div>';
                return;
            }

            logsContainer.innerHTML = appState.logs.map(log => {
                const time = log.timestamp.toLocaleTimeString();
                return `<div class="log-entry ${log.type}">
                    <strong>[${time}]</strong> ${escapeHtml(log.message)}
                </div>`;
            }).join('');

            logsContainer.scrollTop = 0;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showMessage(message, type = 'info') {
            const container = document.getElementById('messageContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `${type}-message`;
            messageEl.textContent = message;
            container.prepend(messageEl);

            setTimeout(() => {
                messageEl.remove();
            }, 5000);
        }

        function getStatusClass(status) {
            if (!status) return 'degraded';
            const lower = status.toLowerCase();
            if (lower === 'healthy') return 'healthy';
            if (lower === 'crashed') return 'crashed';
            return 'degraded';
        }

        function getStatusDisplay(status) {
            if (!status) return '—';
            return status.charAt(0).toUpperCase() + status.slice(1);
        }

        // API Functions
        async function fetchState() {
            try {
                const response = await fetch(`${API_BASE}/state`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                renderState(data);
                return data;
            } catch (error) {
                console.error('Fetch state error:', error);
                showMessage(`Failed to fetch state: ${error.message}`, 'error');
                addLog(`Error fetching state: ${error.message}`, 'error');
                return null;
            }
        }

        async function resetEnvironment(scenarioId = 'api_crash', seed = 42, isInitialization = false) {
            try {
                const response = await fetch(`${API_BASE}/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario_id: scenarioId, seed })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (!isInitialization) {
                    showMessage('Environment reset successfully', 'success');
                    addLog('Environment reset', 'success');
                }

                return data;
            } catch (error) {
                console.error('Reset error:', error);
                const errorMsg = `Reset failed: ${error.message}`;
                showMessage(errorMsg, 'error');
                addLog(errorMsg, 'error');
                throw error;
            }
        }

        async function resetEnv() {
            setLoading(true);
            appState.logs = [];
            renderLogs();

            try {
                const data = await resetEnvironment('api_crash', 42, false);
                renderState(data);
            } catch (error) {
                // Error already logged in resetEnvironment
            } finally {
                setLoading(false);
            }
        }

        async function stepEnv() {
            const action = document.getElementById('actionSelect').value;
            if (!action) {
                showMessage('Please select an action', 'error');
                return;
            }

            setLoading(true);
            try {
                const response = await fetch(`${API_BASE}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                addLog(`Action: ${action}`, 'info');
                addLog(`Reward: ${data.reward || 0}`, 'success');
                renderState(data);
                document.getElementById('actionSelect').value = '';
            } catch (error) {
                console.error('Step error:', error);
                showMessage(`Step failed: ${error.message}`, 'error');
                addLog(`Step failed: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function autoRun() {
            setLoading(true);
            appState.logs = [];
            renderLogs();

            try {
                const response = await fetch(`${API_BASE}/auto-run`, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                addLog('Auto-run completed', 'success');

                if (data.actions && Array.isArray(data.actions)) {
                    data.actions.forEach(action => {
                        addLog(`Action: ${action}`, 'info');
                    });
                }

                showMessage('Auto-run executed successfully', 'success');
                renderState(data);
            } catch (error) {
                console.error('Auto-run error:', error);
                showMessage(`Auto-run failed: ${error.message}`, 'error');
                addLog(`Auto-run failed: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        // Render Functions
        function renderState(data) {
            if (!data) return;

            // Update system status
            const services = data.services || {};
            const healthStatuses = Object.values(services).map(s => s?.status || 'degraded');
            const overallHealth = healthStatuses.every(s => s === 'healthy') ? 'healthy' : 
                                 healthStatuses.some(s => s === 'crashed') ? 'crashed' : 'degraded';
            
            const healthDot = document.getElementById('systemHealthDot');
            healthDot.className = `status-dot ${getStatusClass(overallHealth)}`;
            document.getElementById('systemStatus').textContent = overallHealth.toUpperCase();

            // Update service statuses
            updateServiceStatus('api', services.api?.status || 'degraded');
            updateServiceStatus('db', services.db?.status || 'degraded');
            updateServiceStatus('worker', services.worker?.status || 'degraded');

            // Update metrics
            const metrics = data.metrics || {};
            document.getElementById('errorRate').textContent = (metrics.error_rate || 0).toFixed(1);
            document.getElementById('responseTime').textContent = Math.round(metrics.response_time_ms || 0);
            document.getElementById('uptime').textContent = (metrics.uptime_percent || 0).toFixed(1);

            // Update summary
            document.getElementById('stepsTaken').textContent = data.steps || 0;
            document.getElementById('cumulativeReward').textContent = (data.cumulative_reward || 0).toFixed(2);

            const isResolved = data.resolved || false;
            const resolution = document.getElementById('resolution');
            resolution.textContent = isResolved ? 'Resolved' : 'Unresolved';
            resolution.className = `summary-content ${isResolved ? 'resolved' : 'unresolved'}`;

            const episodeStatus = document.getElementById('episodeStatus');
            episodeStatus.textContent = data.done ? 'Complete' : 'In Progress';
        }

        function updateServiceStatus(serviceName, status) {
            const statusEl = document.getElementById(`${serviceName}Status`);
            if (!statusEl) return;

            const statusClass = getStatusClass(status);
            const statusDisplay = getStatusDisplay(status);

            statusEl.innerHTML = `
                <span class="service-indicator ${statusClass}"></span>
                <span>${statusDisplay}</span>
            `;
        }

        // Initialization
        async function initialize() {
            addLog('Dashboard initializing...', 'info');
            setLoading(true);

            try {
                // Step 1: Reset environment with scenario params
                addLog('Calling POST /reset with scenario_id=api_crash, seed=42', 'info');
                const resetData = await resetEnvironment('api_crash', 42, true);
                addLog('Reset successful', 'success');

                // Step 2: Fetch initial state
                addLog('Fetching initial state...', 'info');
                const stateData = await fetchState();

                if (stateData) {
                    addLog('Initial state loaded successfully', 'success');
                }
            } catch (error) {
                console.error('Initialization error:', error);
                addLog('Initialization failed. Please check the backend and reload.', 'error');
            } finally {
                setLoading(false);
            }
        }

        // Load on page ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }

        // Refresh state periodically
        setInterval(() => {
            if (!appState.isLoading) {
                fetchState();
            }
        }, 3000);
    </script>
</body>
</html>
